<svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 48 48">
  <defs>
    <linearGradient id="leafGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4CAF50"/>
      <stop offset="100%" style="stop-color:#2E7D32"/>
    </linearGradient>
    <linearGradient id="grainGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#FFC107"/>
      <stop offset="100%" style="stop-color:#FF9800"/>
    </linearGradient>
  </defs>
  
  <!-- Fondo circular -->
  <circle cx="24" cy="24" r="23" fill="#1B5E20"/>
  
  <!-- Hoja principal (izquierda) -->
  <path d="M18 12c-2 0-4 1-5 3l-3 6c-1 2-1 4 0 6l3 6c1 2 3 3 5 3h10c2 0 4-1 5-3l3-6c1-2 1-4 0-6l-3-6c-1-2-3-3-5-3H18z" fill="url(#leafGradient)"/>
  
  <!-- Hoja secundaria (derecha) -->
  <path d="M30 12c2 0 4 1 5 3l3 6c1 2 1 4 0 6l-3 6c-1 2-3 3-5 3H20c-2 0-4-1-5-3l-3-6c-1-2-1-4 0-6l3-6c1-2 3-3 5-3h10z" fill="url(#leafGradient)"/>
  
  <!-- Grano central (representando productos agrícolas) -->
  <circle cx="24" cy="24" r="6" fill="url(#grainGradient)"/>
  
  <!-- Detalle de grano -->
  <circle cx="24" cy="24" r="4" fill="#FFB300"/>
  
  <!-- Líneas decorativas (tallos) -->
  <path d="M24 18v-4" stroke="#81C784" stroke-width="1" stroke-linecap="round"/>
  <path d="M24 34v4" stroke="#81C784" stroke-width="1" stroke-linecap="round"/>
</svg>
